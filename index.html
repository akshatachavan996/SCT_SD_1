<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌡️ Temperature Converter</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="top">

<h1>🌡️ Temperature Converter</h1>

<p>Fast • Accurate • Smart</p>

</div>


<div class="card">

<label>🌡️ Enter Temperature</label>

<input
type="number"
id="temperature"
placeholder="Enter Temperature">

<p id="error" class="error"></p>

<div class="dropdowns">

<div>

<label>🔄 From</label>

<select id="from">

<option value="celsius">Celsius (°C)</option>

<option value="fahrenheit">Fahrenheit (°F)</option>

<option value="kelvin">Kelvin (K)</option>

</select>

</div>

<div>

<label>🎯 To</label>

<select id="to">

<option value="fahrenheit">Fahrenheit (°F)</option>

<option value="celsius">Celsius (°C)</option>

<option value="kelvin">Kelvin (K)</option>

</select>

</div>

</div>


<div class="buttons">

<button id="convertBtn">

🔥 Convert

</button>

<button id="swapBtn">

🔄 Swap

</button>

<button id="resetBtn">

🧹 Reset

</button>

</div>

</div>


<div class="result-card">

<h2>✅ Result</h2>

<p id="result">

0 °C = 32 °F

</p>

<button id="copyBtn">

📋 Copy Result

</button>

</div>


<div class="info-grid">

<div class="info-box">

<h3>📚 Formula Used</h3>

<p id="formula">

°C × 9/5 + 32

</p>

</div>

<div class="info-box">

<h3>💡 Did You Know?</h3>

<p id="fact">

Water freezes at 0°C.

</p>

</div>

<div class="info-box">

<h3>🌍 Absolute Zero</h3>

<p>

−273.15°C is the coldest possible temperature.

</p>

</div>

</div>

<footer>

<p>Made by Akshata</p>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
